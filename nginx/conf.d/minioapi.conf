# HTTP: ACME challenge + redirect
server {
    listen 80;
    server_name blob.johnmgrubbs.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    http2 on;
    server_name blob.johnmgrubbs.io;

    ssl_certificate /etc/letsencrypt/live/blob.johnmgrubbs.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blob.johnmgrubbs.io/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        allow 181.41.206.96;
        allow 100.111.241.71;
        deny all;
        # Option A: Tailscale IP
        proxy_pass http://100.65.219.109:9000;

        # Option B: MagicDNS name
        # proxy_pass http://app1.tailnet-name.ts.net:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
        proxy_read_timeout 300;
        proxy_send_timeout 300;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}